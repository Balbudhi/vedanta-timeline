<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=2" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex" />
  <meta name="referrer" content="no-referrer" />
  <title>Koi Hor Nahi Hai Mera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&family=Cardo:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/style.css" />
  <link rel="stylesheet" href="../../assets/song.css" />
</head>
<body>
  <main class="song-page">

    <header class="song-hero">
      <h1 class="song-title">Koī Hor Nahī Hai Merā</h1>
      <p class="song-attrib"><em>Jai Mātā Dī</em></p>
    </header>

    <section class="song-root" id="songRoot" aria-live="polite"></section>

  </main>

  <div class="audio-player" id="audioPlayer">
    <button class="ap-btn" id="apPlayPause" type="button" aria-label="Play">
      <svg class="ap-icon ap-icon-play" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M7 5l12 7-12 7V5z" fill="currentColor"/></svg>
      <svg class="ap-icon ap-icon-pause" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M6 5h4v14H6zM14 5h4v14h-4z" fill="currentColor"/></svg>
    </button>
    <span class="ap-time" id="apTimeCurrent">0:00</span>
    <div class="ap-progress" id="apProgress">
      <div class="ap-progress-bar" id="apProgressBar"></div>
    </div>
    <span class="ap-time ap-time-total" id="apTimeTotal">—:—</span>
    <audio id="songAudio" preload="metadata">
      <source src="audio.m4a" type="audio/mp4">
    </audio>
  </div>

  <script src="timings.js"></script>
  <script src="../../assets/song.js"></script>
</body>
</html>
